<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - Jiglu Valley</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .hero {
      height: 45vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('images/hero.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .form-container {
      max-width: 500px;
      margin: -60px auto 30px;
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .stars {
      display: flex;
      gap: 8px;
      margin: 10px 0 15px;
    }

    .stars span {
      font-size: 28px;
      cursor: pointer;
      color: #ccc;
    }

    .stars span.active {
      color: #facc15;
    }

    .reviews {
      max-width: 750px;
      margin: auto;
      padding: 20px;
    }

    .review-card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 14px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Share Your Experience 🌿</h1>
  </div>

  <div class="form-container">
    <input type="text" id="name" placeholder="Your Name">

    <div class="stars">
      <span onclick="setRating(1)">★</span>
      <span onclick="setRating(2)">★</span>
      <span onclick="setRating(3)">★</span>
      <span onclick="setRating(4)">★</span>
      <span onclick="setRating(5)">★</span>
    </div>

    <textarea id="review" placeholder="Your Review"></textarea>

    <button onclick="submitReview()">Submit Review</button>
  </div>

  <div class="reviews">
    <h2>Customer Reviews</h2>
    <div id="reviewsContainer"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOtlm8NiNYLaBKU1WhkCSZ-HWizk2dVKs",
      authDomain: "jiglu-valley.firebaseapp.com",
      projectId: "jiglu-valley",
      storageBucket: "jiglu-valley.firebasestorage.app",
      messagingSenderId: "619513636984",
      appId: "1:619513636984:web:7231ae82bb9ab4fef3258d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let selectedRating = 0;

    window.setRating = function (rating) {
      selectedRating = rating;
      document.querySelectorAll(".stars span").forEach((star, index) => {
        star.classList.toggle("active", index < rating);
      });
    };

    window.submitReview = async function () {
      const name = document.getElementById("name").value;
      const review = document.getElementById("review").value;

      if (!name || !review || selectedRating === 0) {
        alert("Please fill all fields");
        return;
      }

      await addDoc(collection(db, "reviews"), {
        name,
        review,
        rating: selectedRating,
        time: new Date()
      });

      alert("Review submitted!");

      document.getElementById("name").value = "";
      document.getElementById("review").value = "";
      selectedRating = 0;

      document.querySelectorAll(".stars span").forEach(s => s.classList.remove("active"));

      loadReviews();
    };

    async function loadReviews() {
      const querySnapshot = await getDocs(collection(db, "reviews"));
      const container = document.getElementById("reviewsContainer");

      container.innerHTML = "";

      querySnapshot.forEach((doc) => {
        const data = doc.data();

        const stars = "★".repeat(data.rating) + "☆".repeat(5 - data.rating);

        const div = document.createElement("div");
        div.classList.add("review-card");

        div.innerHTML = `
          <p style="color:#f4c430; font-size:26px; letter-spacing:4px;">${stars}</p>
          <h3 style="color:#2e7d32;">${data.name}</h3>
          <p style="font-style:italic;">"${data.review}"</p>
        `;

        container.appendChild(div);
      });
    }

    loadReviews();
  </script>

</body>
</html>
