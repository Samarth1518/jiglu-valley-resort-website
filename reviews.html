<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - Jiglu Valley</title>

  <style>

    img {
  max-width: 100%;
  height: auto;
}

    body {
  overflow-x: hidden;
}
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('images/hero.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .hero {
      height: 45vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .form-container {
      max-width: 500px;
      width: 90%;
      margin: -60px auto 30px;
      padding: 25px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
      background: rgba(255,255,255,0.9);
    }

    textarea {
      min-height: 100px;
      resize: none;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(45deg, #2e7d32, #66bb6a);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .stars {
      display: flex;
      gap: 10px;
      margin: 10px 0 15px;
    }

    .stars span {
      font-size: 32px;
      padding: 6px;
      cursor: pointer;
      color: #ccc;
      transition: 0.2s;
    }

    .stars span.active {
      color: #facc15;
      transform: scale(1.2);
    }

    .reviews {
      max-width: 750px;
      margin: auto;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
    }

    .reviews h2 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
    }

    .review-card p {
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}

    .review-card {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      margin: 15px 0;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .review-card:hover {
      transform: translateY(-5px);
    }

    .review-card p {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Share Your Experience 🌿</h1>
  </div>

  <div class="form-container">
    <input type="text" id="name" placeholder="Your Name">

    <div class="stars">
      <span onclick="setRating(1)">★</span>
      <span onclick="setRating(2)">★</span>
      <span onclick="setRating(3)">★</span>
      <span onclick="setRating(4)">★</span>
      <span onclick="setRating(5)">★</span>
    </div>

    <textarea id="review" placeholder="Your Review"></textarea>

    <button onclick="submitReview()">Submit Review</button>
  </div>

  <div class="reviews">
    <h2>Customer Reviews</h2>
    <div id="reviewsContainer"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOtlm8NiNYLaBKU1WhkCSZ-HWizk2dVKs",
      authDomain: "jiglu-valley.firebaseapp.com",
      projectId: "jiglu-valley",
      storageBucket: "jiglu-valley.firebasestorage.app",
      messagingSenderId: "619513636984",
      appId: "1:619513636984:web:7231ae82bb9ab4fef3258d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
window.getDocs = getDocs;
window.collection = collection;

    let selectedRating = 0;

    window.setRating = function (rating) {
      selectedRating = rating;
      document.querySelectorAll(".stars span").forEach((star, index) => {
        star.classList.toggle("active", index < rating);
      });
    };

    window.submitReview = async function () {
      const name = document.getElementById("name").value;
      const review = document.getElementById("review").value;

      if (!name || !review || selectedRating === 0) {
        alert("Please fill all fields");
        return;
      }

      await addDoc(collection(db, "reviews"), {
        name,
        review,
        rating: selectedRating,
        time: new Date()
      });

      alert("Review submitted!");

      document.getElementById("name").value = "";
      document.getElementById("review").value = "";
      selectedRating = 0;

      document.querySelectorAll(".stars span").forEach(s => s.classList.remove("active"));

      loadReviews();
    };

    async function loadReviews() {
      const querySnapshot = await getDocs(collection(db, "reviews"));
      const container = document.getElementById("reviewsContainer");

      container.innerHTML = "";

      querySnapshot.forEach((doc) => {
        const data = doc.data();

        const stars = "★".repeat(data.rating) + "☆".repeat(5 - data.rating);

        const div = document.createElement("div");
        div.classList.add("review-card");

        div.innerHTML = `
          <p style="color:#f4c430; font-size:26px; letter-spacing:4px;">${stars}</p>
          <h3 style="color:#2e7d32;">${data.name}</h3>
          <p style="font-style:italic;">"${data.review}"</p>
        `;

        container.appendChild(div);
      });
    }

    loadReviews();
  </script>
<style>
  .back-home-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 9999;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    text-decoration: none;
    backdrop-filter: blur(6px);
    transition: 0.3s;
  }

  .back-home-btn:hover {
    background: rgba(0, 0, 0, 0.7);
  }
</style>

<a href="index.html" class="back-home-btn">
  ← Home
</a>
</body>
</html>
